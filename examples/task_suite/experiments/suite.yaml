job_name: task-suite-strtools-csvtools
jobs_dir: jobs
n_attempts: 1
n_concurrent_trials: 1

agents:
  - name: copilot-cli
    model_name: gpt-5-mini
    kwargs:
      reasoning_effort: low

tasks:
  - path: ../tasks/reverse-words
  - path: ../tasks/csv-parser

artifacts:
  - source: /app/strtools.py
    destination: strtools.py
  - source: /app/csvtools.py
    destination: csvtools.py
