version = "1.0"

[task]
name = "examples/csv-parser"
description = "Implement a small RFC 4180-style CSV parser so the verifier passes."
authors = [{ name = "copilot-experiments" }]
keywords = ["copilot", "python", "csv", "state-machine"]

[metadata]
difficulty = "medium"
category = "programming"

[agent]
timeout_sec = 900.0

[verifier]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
workdir = "/app"
